name: CI/CD
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "**.zig"
      - "**.zig.zon"
      - "**.c"
      - "**.h"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "**.zig"
      - "**.zig.zon"
      - "**.c"
      - "**.h"
  workflow_dispatch:

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      
      - name: get zig
        uses: mlugg/setup-zig@v2
      
      - name: lint
        run: zig fmt --check --ast-check .
      
      - name: test
        run: zig build test --summary all
